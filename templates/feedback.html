<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback - Vokabeltrainer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="container">
    <form action="{{ url_for('back_to_selection') }}" method="post" class="topbar-form" id="back-form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="button secondary">Zur Auswahl</button>
    </form>

    <div class="card {{ 'ok' if correct else 'error' }}">
      {% if correct %}
        <h2>Richtig</h2>
      {% else %}
        <h2>Falsch</h2>
        <p><strong>Deine Antwort:</strong> {{ user_answer or '(leer)' }}</p>
        <p><strong>Richtig wäre:</strong> {{ expected }}</p>
      {% endif %}

      {% if answer_audio_url %}
        <audio id="answer-audio" src="{{ answer_audio_url }}" preload="auto" autoplay></audio>
        <button id="play-answer-audio" type="button" class="secondary">Übersetzung nochmal vorspielen</button>
      {% endif %}

      <div class="actions">
        {% if can_mark_correct %}
          <form action="{{ url_for('mark_correct') }}" method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="secondary">Doch als richtig werten</button>
          </form>
        {% endif %}
        <form action="{{ url_for('next_question') }}" method="get" id="next-form">
          <button type="submit" autofocus>Nächste Frage</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        const backForm = document.getElementById("back-form");
        if (!backForm) return;
        event.preventDefault();
        backForm.submit();
        return;
      }
      if (event.key !== "Enter") return;
      const target = event.target;
      const tag = (target && target.tagName ? target.tagName.toLowerCase() : "");
      if (tag === "input" || tag === "textarea") return;
      const nextForm = document.getElementById("next-form");
      if (!nextForm) return;
      event.preventDefault();
      nextForm.submit();
    });

    const answerAudio = document.getElementById("answer-audio");
    const playAnswerBtn = document.getElementById("play-answer-audio");
    if (answerAudio) {
      answerAudio.play().catch(() => {});
    }
    if (answerAudio && playAnswerBtn) {
      playAnswerBtn.addEventListener("click", function () {
        answerAudio.currentTime = 0;
        answerAudio.play().catch(() => {});
      });
    }
  </script>
</body>
</html>
