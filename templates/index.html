<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vokabeltrainer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="container">
    <h1>Vokabeltrainer</h1>
    <p class="muted">Datensätze in CSV: {{ total }}</p>

    {% if error %}
      <div class="card error">{{ error }}</div>
    {% else %}
      <form action="{{ url_for('start') }}" method="post" class="card grid">
        <label>Modus
          <select name="mode" id="mode-select">
            <option value="kartei">Kartei</option>
            <option value="abschreiben">Abschreiben</option>
            <option value="deklination">Deklination</option>
            <option value="block">Block-Modus</option>
            <option value="fehler">Meiste Fehler zuerst</option>
          </select>
        </label>

        <fieldset>
          <legend>Lektionen</legend>
          <div class="lesson-grid">
            {% for l in lektionen %}
              <label><input type="checkbox" name="lektionen" value="{{ l }}"> Lektion {{ l }}</label>
            {% endfor %}
          </div>
          <p class="hint">Wenn nichts angehakt ist, werden automatisch alle Lektionen genutzt.</p>
        </fieldset>

        <div id="block-settings" class="block-settings hidden">
          <label>Blockgröße
            <input type="number" name="block_size" min="1" value="5">
          </label>
          <label>Wiederholungen
            <input type="number" name="repetitions" min="1" value="1">
          </label>
          <label>Blöcke
            <input type="text" name="block_selection" value="alle" placeholder="z.B. 1,3 oder alle">
          </label>
        </div>

        <button type="submit">Lernen starten</button>
      </form>
    {% endif %}
  </main>

  <script>
    const modeSelect = document.getElementById('mode-select');
    const blockSettings = document.getElementById('block-settings');

    function toggleBlockSettings() {
      const active = modeSelect.value === 'block';
      blockSettings.classList.toggle('hidden', !active);
    }

    modeSelect.addEventListener('change', toggleBlockSettings);
    toggleBlockSettings();
  </script>
</body>
</html>
